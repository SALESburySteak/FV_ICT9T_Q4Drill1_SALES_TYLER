<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q4 Drill 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #nc {
      text-align: center;
      margin-top: 10%;
      border: 11px solid #0d6efd; 
      border-radius: 8px;  
    }
    body {
      background-color: rgb(194, 202, 248);
    }
  </style>
</head>
<body>
  <div class="container bg-light" id="nc">
    <div class="p-4 text-center" style="max-width: 800px; width: 70%; margin: 0 auto;">
      <h1 class="text-primary mb-4">Electricity Consumption Classifier</h1>

      <input type="text" class="form-control mb-3 mx-auto" id="Classify" placeholder="Input Kilowatts Per Hour" style="max-width: 300px;">
      <button class="btn btn-primary mx-auto w-100" style="max-width: 150px;" onclick="classify()">Classify</button>
    </div>
  </div>

  <script>
    function classify(){
      var kWh = document.getElementById("Classify").value;
      let cat1 = "Lifeline Consumer";

      if (isNaN(kWh) || kWh < 0){
        alert("Please input a valid number.");
      }
      else if((kWh<101) && (kWh>0)){
        alert(cat1 + ": You have a discounted rate.");
      }
      else if((kWh<201) && (kWh>100)){
        alert(cat1 + ": You have a Normal Residential rate.");
      }
      else if((kWh<301) && (kWh>200)){
        alert(cat1 + ": You have Typical Electricity usage.");
      }
      else if((kWh<501) && (kWh>300)){
        alert(cat1 + ": You have a Higher Electricity usage.");
      }
      else if(kWh>500){
        alert(cat1 + ": You have a Heavy Electricity usage.");
      }
      else{
        alert(cat1 + ": Please input a value first.");
      }
    }
  </script>
</body>
</html>
